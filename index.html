<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Punktesystem</title>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  width: 360px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

input, select, button {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: white;
  color: #333;
  font-weight: bold;
  cursor: pointer;
}

button:hover { background: #ddd; }

.user-box {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  margin: 5px 0;
}
</style>
</head>

<body>
<div class="card" id="app"></div>

<script>
// ===== ADMIN LOGIN =====
const admin = {username: "Admin", password: "admin123123"};

// ===== STORAGE INIT =====
if (!localStorage.getItem("users")) {
  localStorage.setItem("users", JSON.stringify([]));
}

// ===== LOGIN =====
function renderLogin() {
  app.innerHTML = `
    <h2>Login</h2>
    <input id="user" placeholder="Nutzername">
    <input id="pass" type="password" placeholder="Passwort">
    <button onclick="login()">Login</button>

    <p>Noch kein Konto?</p>
    <button onclick="renderRegister()">Registrieren</button>
  `;
}

function login() {
  const u = user.value;
  const p = pass.value;

  if (u === admin.username && p === admin.password) {
    renderAdmin();
    return;
  }

  let users = JSON.parse(localStorage.getItem("users"));
  let found = users.find(x => x.username === u && x.password === p);

  if (found) {
    localStorage.setItem("currentUser", JSON.stringify(found));
    renderDashboard();
  } else {
    alert("Falsche Daten");
  }
}

// ===== REGISTRIERUNG (MIT EMAIL AN DICH) =====
function renderRegister() {
  app.innerHTML = `
    <h2>Registrierung</h2>

    <form action="https://formsubmit.co/DEINE-EMAIL@EMAIL.DE" method="POST">
      <input name="email" placeholder="Email" required>
      <input name="username" placeholder="Nutzername" required>
      <input name="password" placeholder="Passwort" required>

      <input type="hidden" name="_subject" value="Neue Registrierung">
      <input type="hidden" name="_captcha" value="false">

      <button type="submit">Registrieren</button>
    </form>

    <button onclick="renderLogin()">Zurück</button>
  `;
}

// ===== DASHBOARD =====
function renderDashboard() {
  let user = JSON.parse(localStorage.getItem("currentUser"));

  app.innerHTML = `
    <h2>Hallo ${user.username}</h2>
    <h3>${user.points} Punkte</h3>

    <select>
      <option>Verdienen</option>
      <option>Ausgeben</option>
    </select>

    <select>
      <option>Aufgabe</option>
      <option>Bonus</option>
      <option>Kauf</option>
    </select>

    <form action="https://formsubmit.co/DEINE-EMAIL@EMAIL.DE" method="POST">
      <input type="hidden" name="user" value="${user.username}">
      <input type="hidden" name="_subject" value="Punkte Anfrage">

      <button type="submit">Anfrage senden</button>
    </form>

    <button onclick="logout()">Logout</button>
  `;
}

// ===== ADMIN =====
function renderAdmin() {
  let users = JSON.parse(localStorage.getItem("users"));

  let list = users.map((u,i) => `
    <div class="user-box">
      ${u.username} (${u.points} Punkte)
      <input type="number" id="p${i}" placeholder="Neue Punkte">
      <button onclick="updatePoints(${i})">Speichern</button>
    </div>
  `).join("");

  app.innerHTML = `
    <h2>Admin Panel</h2>

    <h3>Neuen Nutzer erstellen</h3>
    <input id="aUser" placeholder="Username">
    <input id="aPass" placeholder="Passwort">
    <input id="aPoints" placeholder="Startpunkte">
    <button onclick="createUser()">Erstellen</button>

    <h3>Alle Nutzer</h3>
    ${list}

    <button onclick="logout()">Logout</button>
  `;
}

function createUser() {
  let users = JSON.parse(localStorage.getItem("users"));

  users.push({
    username: aUser.value,
    password: aPass.value,
    points: Number(aPoints.value)
  });

  localStorage.setItem("users", JSON.stringify(users));
  renderAdmin();
}

function updatePoints(i) {
  let users = JSON.parse(localStorage.getItem("users"));
  users[i].points = Number(document.getElementById("p"+i).value);
  localStorage.setItem("users", JSON.stringify(users));
  renderAdmin();
}

// ===== LOGOUT =====
function logout() {
  localStorage.removeItem("currentUser");
  renderLogin();
}

// START
renderLogin();
</script>
</body>
</html>
